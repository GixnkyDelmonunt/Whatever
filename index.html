<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jaux's and Max's Hitlist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Jaux's and Max's Hitlist</h1>
  
  <input
    type="text"
    id="searchInput"
    placeholder="Search by username..."
    autocomplete="off"
    aria-label="Search avatars by username"
  />

  <div class="avatar-grid" id="avatarGrid"></div>

  <div id="adminModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <h3>Add Global Avatar</h3>
      <input id="passInput" type="password" placeholder="Password">
      <input id="nameInput" type="text" placeholder="Username">
      <input id="idInput" type="number" placeholder="Roblox ID">
      <button onclick="addPlayer()">Add to Hitlist</button>
    </div>
  </div>

  <div id="customAlert" class="modal-overlay" style="display:none; z-index: 2000;">
    <div class="modal-content" style="width: 250px; text-align: center;">
      <p id="alertMessage" style="color: white; margin-bottom: 20px;"></p>
      <button onclick="document.getElementById('customAlert').style.display='none'">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
