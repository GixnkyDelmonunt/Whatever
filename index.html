<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jaux's and Max's Hitlist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Jaux's and Max's Hitlist</h1>
  
  <div class="search-container">
    <input
      type="text"
      id="searchInput"
      placeholder="Search by username..."
      autocomplete="off"
      aria-label="Search avatars by username"
    />
  </div>

  <div class="avatar-grid" id="avatarGrid"></div>

  <div class="modal-overlay" id="avatarModal">
    <div class="modal-content">
      <h2>Secret Admin Panel</h2>
      <div class="form-group">
        <label for="modalPassword">Admin Password</label>
        <input type="password" id="modalPassword" placeholder="Enter key..." autocomplete="off">
      </div>
      <div class="form-group">
        <label for="modalUsername">Username to Add</label>
        <input type="text" id="modalUsername" placeholder="e.g., GuestPlayer" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="modalID">User ID to Add</label>
        <input type="text" id="modalID" placeholder="e.g., 123456789" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button id="cancelModalBtn" class="btn-secondary">Cancel</button>
        <button id="submitAvatarBtn" class="btn-primary">Add Globally</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
